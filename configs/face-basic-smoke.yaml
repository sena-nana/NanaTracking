data:
  dataset: synthetic
  samples: 8
  batch_size: 4
  executor: inline
  workers: 0
  buffersize: 2
  require_complete_basic: true
model:
  name: face_basic
  input_channels: 3
  input_height: 64
  input_width: 64
  hidden_dims: 32
  rig_dims: 36
  pose_dims: 7
  landmark_count: 16
  identity_classes: 2
  identity_dims: 8
  dropout: 0.0
training:
  seed: 17
  max_steps: 1
  learning_rate: 0.001
  device: cpu
  amp: false
  rig_loss_weight: 1.0
  pose_loss_weight: 0.5
  landmark_loss_weight: 0.25
  visibility_loss_weight: 0.1
  confidence_loss_weight: 0.2
  identity_adversary_weight: 0.05
  mirror_consistency_weight: 0.1
evaluation:
  atol: 0.00001
  rtol: 0.0001
export:
  opset: 18
  model_family: nana-face-basic
  model_version: 0.1.0-smoke
  smoke_only: true
reproducibility:
  output_dir: runs/face-basic-smoke
  data_revision: synthetic-face-basic-v0
  ntp_schema_revision: ntp/1.0
  signal_registry_revision: ntp-signals/1.0.0
  normalization_revision: ntp-normalization/1.0.0
  calibration_revision: ntp-calibration/1.0.0
  feature_revision: ntp-features/1.0.0
